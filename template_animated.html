<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{REPO_NAME}} — Repo Growth (animated)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --border: #1e2230;
    --accent: #00e5a0;
    --accent2: #0090ff;
    --accent3: #ff6b6b;
    --accent4: #ffd93d;
    --accent5: #c77dff;
    --text: #e8eaf0;
    --muted: #5a6070;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: auto; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
  }

  /* ---------- Hero ---------- */
  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 32px;
    position: relative;
  }
  .hero h1 {
    font-size: clamp(36px, 7vw, 88px);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
  }
  .hero h1 span { color: var(--accent); }
  .hero .sub {
    margin-top: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .hero .scroll-cue {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: bob 2.2s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translate(-50%, 0); opacity: 0.6; }
    50%      { transform: translate(-50%, 8px); opacity: 1; }
  }

  /* ---------- Scrollytelling sections ---------- */
  .story {
    position: relative;
    height: 220vh;            /* total scroll distance for one chart */
    border-top: 1px solid var(--border);
  }
  .sticky {
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 32px clamp(20px, 5vw, 64px);
  }
  .chart-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 24px;
    margin-bottom: 18px;
  }
  .chart-title {
    font-size: clamp(18px, 2.4vw, 28px);
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .chart-title small {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .readout {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
  }
  .readout-date {
    font-size: clamp(14px, 1.8vw, 20px);
    color: var(--accent);
    font-weight: 500;
  }
  .readout-value {
    font-size: clamp(20px, 3vw, 36px);
    font-weight: 700;
    color: var(--text);
    margin-top: 2px;
  }
  .canvas-frame {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px 18px;
    min-height: 0;
    position: relative;
    overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; }

  .commit-msg {
    margin-top: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    min-height: 18px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .commit-msg .hash { color: var(--accent2); margin-right: 8px; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 10px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* Progress indicator on the side */
  .progress-rail {
    position: fixed;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 30vh;
    background: var(--border);
    border-radius: 2px;
    z-index: 20;
    pointer-events: none;
  }
  .progress-fill {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: height 0.05s linear;
  }

  /* ---------- Outro ---------- */
  .outro {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px 32px;
    border-top: 1px solid var(--border);
  }
  .outro h2 {
    font-size: clamp(28px, 5vw, 56px);
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 32px;
  }
  .outro h2 span { color: var(--accent); }
  .outro-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    max-width: 900px;
    width: 100%;
  }
  .outro-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 22px;
    text-align: left;
  }
  .outro-stat .v {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }
  .outro-stat .v.neg { color: var(--accent3); }
  .outro-stat .l {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }
  .outro .foot {
    margin-top: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  @media (max-width: 700px) {
    .story { height: 180vh; }
    .chart-head { flex-direction: column; align-items: flex-start; gap: 4px; }
    .readout { text-align: left; }
    .progress-rail { display: none; }
  }
</style>
</head>
<body>

<div class="hero">
  <h1><span>{{REPO_NAME}}</span> growth</h1>
  <p class="sub">branch: {{BRANCH}} &nbsp;·&nbsp; {{TOTAL_COMMITS}} commits</p>
  <div class="scroll-cue">scroll to watch it grow ↓</div>
</div>

<section class="story" data-chart="lines">
  <div class="sticky">
    <div class="chart-head">
      <div class="chart-title">
        <small>Chapter 1</small>
        Lines of Code
      </div>
      <div class="readout">
        <div class="readout-date" id="dateLines">—</div>
        <div class="readout-value" id="valLines">—</div>
      </div>
    </div>
    <div class="canvas-frame"><canvas id="linesChart"></canvas></div>
    <div class="commit-msg" id="msgLines"><span class="hash"></span><span class="text"></span></div>
  </div>
</section>

<section class="story" data-chart="files">
  <div class="sticky">
    <div class="chart-head">
      <div class="chart-title">
        <small>Chapter 2</small>
        Total Files
      </div>
      <div class="readout">
        <div class="readout-date" id="dateFiles">—</div>
        <div class="readout-value" id="valFiles">—</div>
      </div>
    </div>
    <div class="canvas-frame"><canvas id="filesChart"></canvas></div>
    <div class="commit-msg" id="msgFiles"><span class="hash"></span><span class="text"></span></div>
  </div>
</section>

<section class="story" data-chart="exts">
  <div class="sticky">
    <div class="chart-head">
      <div class="chart-title">
        <small>Chapter 3</small>
        Lines by File Type
      </div>
      <div class="readout">
        <div class="readout-date" id="dateExts">—</div>
        <div class="readout-value" id="valExts">—</div>
      </div>
    </div>
    <div class="canvas-frame"><canvas id="extsChart"></canvas></div>
    <div class="legend" id="extsLegend"></div>
  </div>
</section>

<div class="progress-rail"><div class="progress-fill" id="progressFill"></div></div>

<div class="outro">
  <h2>that's how <span>{{REPO_NAME}}</span> grew</h2>
  <div class="outro-stats" id="outroStats"></div>
  <div class="foot">generated by repo_growth.py · scroll back up to rewind</div>
</div>

<script>
const RAW   = {{DATA_JSON}};
const EXTS  = {{TOP_EXTS_JSON}};
const STATS = {{STATS_JSON}};

// Same early-empty-commit filter as the static template, with a safety fallback
// for tiny repos where filtering would leave us with fewer than 2 points.
const _sorted = RAW.slice().sort((a,b) => a.date.localeCompare(b.date));
const _maxLines = Math.max(..._sorted.map(d=>d.lines)) || 1;
const _filtered = _sorted.filter(d => d.lines > _maxLines * 0.02);
const DATA = _filtered.length >= 2 ? _filtered : _sorted;

const EXT_COLORS = ['#00e5a0','#0090ff','#ff6b6b','#ffd93d','#c77dff','#ff9f43'];

/* ---------------- Canvas helpers ---------------- */

function setupCanvas(canvas) {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = Math.max(1, Math.floor(rect.width  * dpr));
  canvas.height = Math.max(1, Math.floor(rect.height * dpr));
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { ctx, W: rect.width, H: rect.height };
}

function drawGrid(ctx, PAD, CW, CH, minY, maxY, steps) {
  for (let i = 0; i <= steps; i++) {
    const v = minY + (maxY - minY) / steps * i;
    const y = PAD.top + CH - ((v - minY) / (maxY - minY)) * CH;
    ctx.strokeStyle = '#1a1e28'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + CW, y); ctx.stroke();
    ctx.fillStyle = '#5a6070'; ctx.font = '11px JetBrains Mono,monospace'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(v).toLocaleString(), PAD.left - 8, y + 4);
  }
}

function smoothLine(ctx, pts) {
  if (pts.length < 2) {
    if (pts.length === 1) { ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); }
    return;
  }
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    const cpx = (pts[i-1].x + pts[i].x) / 2;
    ctx.bezierCurveTo(cpx, pts[i-1].y, cpx, pts[i].y, pts[i].x, pts[i].y);
  }
}

/* Pre-compute axis extents (constant across all progress states so axes don't
   wobble as the line draws in). */
function buildLineMeta(values) {
  const minVal = Math.min(...values), maxVal = Math.max(...values);
  const pad = (maxVal - minVal) * 0.1 || 1;
  return { minY: Math.max(0, minVal - pad), maxY: maxVal + pad };
}

/* Given a progress 0..1, return the index of the last fully-included point
   plus the fractional remainder so callers can interpolate a leading-edge
   point for a smooth draw. */
function progressIndex(n, progress) {
  if (n <= 1) return { full: 0, frac: 0 };
  const exact = progress * (n - 1);
  const full = Math.floor(exact);
  return { full, frac: exact - full };
}

/* ---------------- Line chart ---------------- */

function drawAnimatedLine(canvas, data, valueKey, color, progress) {
  const { ctx, W, H } = setupCanvas(canvas);
  const PAD = { top: 16, right: 16, bottom: 36, left: 84 };
  const CW = W - PAD.left - PAD.right;
  const CH = H - PAD.top - PAD.bottom;
  if (CW <= 0 || CH <= 0) return null;
  const n = data.length;
  if (n < 2) return null;

  const values = data.map(d => d[valueKey]);
  const { minY, maxY } = buildLineMeta(values);
  const times = data.map(d => new Date(d.date).getTime());
  const tMin = times[0], tMax = times[n-1];
  const tSpan = (tMax - tMin) || 1;
  const xp = t => PAD.left + ((t - tMin) / tSpan) * CW;
  const yp = v => PAD.top  + CH - ((v - minY) / (maxY - minY)) * CH;

  drawGrid(ctx, PAD, CW, CH, minY, maxY, 4);

  // X-axis date labels (constant — 7 ticks across full date span)
  ctx.fillStyle = '#5a6070';
  ctx.textAlign = 'center';
  ctx.font = '11px JetBrains Mono,monospace';
  for (let i = 0; i <= 6; i++) {
    const t = tMin + (tMax - tMin) * (i / 6);
    const x = PAD.left + (i / 6) * CW;
    const dt = new Date(t);
    ctx.fillText(`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`, x, H - PAD.bottom + 18);
  }

  // Build the leading slice of points up to the current progress.
  const { full, frac } = progressIndex(n, progress);
  const pts = [];
  for (let i = 0; i <= full; i++) pts.push({ x: xp(times[i]), y: yp(values[i]) });
  let edgeValue = values[full];
  let edgeIdx   = full;
  if (full < n - 1 && frac > 0) {
    const t = times[full] + (times[full+1] - times[full]) * frac;
    const v = values[full] + (values[full+1] - values[full]) * frac;
    pts.push({ x: xp(t), y: yp(v) });
    edgeValue = v;
    // edgeIdx remains "full" — the most recent fully-included commit is still
    // the one we report in the readout.
  }

  if (pts.length >= 2) {
    // Filled area under the line
    smoothLine(ctx, pts);
    ctx.lineTo(pts[pts.length-1].x, PAD.top + CH);
    ctx.lineTo(pts[0].x, PAD.top + CH);
    ctx.closePath();
    const g = ctx.createLinearGradient(0, PAD.top, 0, PAD.top + CH);
    g.addColorStop(0, color + '40');
    g.addColorStop(1, color + '00');
    ctx.fillStyle = g;
    ctx.fill();

    // Line itself
    smoothLine(ctx, pts);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Glowing dot at the leading edge
    const last = pts[pts.length-1];
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(last.x, last.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  return { edgeValue, edgeIdx };
}

/* ---------------- Stacked chart ---------------- */

function drawAnimatedStacked(canvas, data, exts, colors, progress) {
  const { ctx, W, H } = setupCanvas(canvas);
  const PAD = { top: 16, right: 16, bottom: 36, left: 84 };
  const CW = W - PAD.left - PAD.right;
  const CH = H - PAD.top - PAD.bottom;
  if (CW <= 0 || CH <= 0) return null;
  const n = data.length;
  if (n < 2 || !exts.length) return null;

  // Pre-compute the full-range maxY using totals across all data points so the
  // y-axis stays put as the chart fills in.
  const totals = data.map(d => exts.reduce((s, e) => s + ((d.ext_lines && d.ext_lines[e]) || 0), 0));
  const maxY = Math.max(...totals) * 1.1 || 1;
  const times = data.map(d => new Date(d.date).getTime());
  const tMin = times[0], tMax = times[n-1];
  const tSpan = (tMax - tMin) || 1;
  const xp = t => PAD.left + ((t - tMin) / tSpan) * CW;
  const yp = v => PAD.top  + CH - (v / maxY) * CH;

  drawGrid(ctx, PAD, CW, CH, 0, maxY, 4);

  ctx.fillStyle = '#5a6070';
  ctx.textAlign = 'center';
  ctx.font = '11px JetBrains Mono,monospace';
  for (let i = 0; i <= 6; i++) {
    const t = tMin + (tMax - tMin) * (i / 6);
    const x = PAD.left + (i / 6) * CW;
    const dt = new Date(t);
    ctx.fillText(`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`, x, H - PAD.bottom + 18);
  }

  // Build the partial dataset (up to progress) with an interpolated trailing
  // point so the right edge animates smoothly between commits.
  const { full, frac } = progressIndex(n, progress);
  const partial = data.slice(0, full + 1).map(d => ({ t: new Date(d.date).getTime(), ext: d.ext_lines || {} }));
  if (full < n - 1 && frac > 0) {
    const a = data[full], b = data[full + 1];
    const t = new Date(a.date).getTime() + (new Date(b.date).getTime() - new Date(a.date).getTime()) * frac;
    const ext = {};
    for (const e of exts) {
      const av = (a.ext_lines && a.ext_lines[e]) || 0;
      const bv = (b.ext_lines && b.ext_lines[e]) || 0;
      ext[e] = av + (bv - av) * frac;
    }
    partial.push({ t, ext });
  }
  if (partial.length < 2) return { edgeIdx: full, edgeTotal: 0 };

  const stacks = partial.map(p => {
    let cum = 0;
    return exts.map(e => { cum += p.ext[e] || 0; return cum; });
  });

  // Draw bands top-to-bottom for correct overdraw order.
  for (let ei = exts.length - 1; ei >= 0; ei--) {
    const top = stacks.map((s, i) => ({ x: xp(partial[i].t), y: yp(s[ei]) }));
    smoothLine(ctx, top);
    if (ei === 0) {
      ctx.lineTo(top[top.length-1].x, PAD.top + CH);
      ctx.lineTo(top[0].x, PAD.top + CH);
    } else {
      const bot = stacks.map((s, i) => ({ x: xp(partial[i].t), y: yp(s[ei-1]) })).reverse();
      bot.forEach((p, j) => {
        if (j === 0) ctx.lineTo(p.x, p.y);
        else {
          const prev = bot[j-1];
          const cpx = (prev.x + p.x) / 2;
          ctx.bezierCurveTo(cpx, prev.y, cpx, p.y, p.x, p.y);
        }
      });
    }
    ctx.closePath();
    ctx.fillStyle = colors[ei] + 'cc';
    ctx.fill();
  }

  const edgeTotal = stacks[stacks.length-1][exts.length-1];
  return { edgeIdx: full, edgeTotal, edgeExt: partial[partial.length-1].ext };
}

/* ---------------- Scroll → progress wiring ---------------- */

function sectionProgress(section) {
  const rect = section.getBoundingClientRect();
  const sectionH = section.offsetHeight;
  const vh = window.innerHeight;
  const scrollable = sectionH - vh;
  if (scrollable <= 0) return rect.top < 0 ? 1 : 0;
  return Math.max(0, Math.min(1, -rect.top / scrollable));
}

const sections = {
  lines: document.querySelector('[data-chart="lines"]'),
  files: document.querySelector('[data-chart="files"]'),
  exts:  document.querySelector('[data-chart="exts"]'),
};
const canvases = {
  lines: document.getElementById('linesChart'),
  files: document.getElementById('filesChart'),
  exts:  document.getElementById('extsChart'),
};
const readouts = {
  lines: { date: document.getElementById('dateLines'), val: document.getElementById('valLines'), msg: document.getElementById('msgLines') },
  files: { date: document.getElementById('dateFiles'), val: document.getElementById('valFiles'), msg: document.getElementById('msgFiles') },
  exts:  { date: document.getElementById('dateExts'),  val: document.getElementById('valExts') },
};

function updateLineReadout(key, edgeIdx, edgeValue, suffix) {
  const d = DATA[edgeIdx];
  if (!d) return;
  readouts[key].date.textContent = d.date;
  readouts[key].val.textContent  = Math.round(edgeValue).toLocaleString() + (suffix ? ' ' + suffix : '');
  const msg = readouts[key].msg;
  msg.querySelector('.hash').textContent = d.hash || '';
  msg.querySelector('.text').textContent = d.message || '';
}

function renderLegend(extInfo) {
  const el = document.getElementById('extsLegend');
  el.innerHTML = '';
  EXTS.forEach((ext, i) => {
    const v = extInfo ? Math.round(extInfo[ext] || 0) : 0;
    el.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${EXT_COLORS[i]}"></div>${ext} (${v.toLocaleString()})</div>`;
  });
}

function redraw() {
  // Lines
  let p = sectionProgress(sections.lines);
  let res = drawAnimatedLine(canvases.lines, DATA, 'lines', '#00e5a0', p);
  if (res) updateLineReadout('lines', res.edgeIdx, res.edgeValue, 'lines');

  // Files
  p = sectionProgress(sections.files);
  res = drawAnimatedLine(canvases.files, DATA, 'files', '#0090ff', p);
  if (res) updateLineReadout('files', res.edgeIdx, res.edgeValue, 'files');

  // Exts
  p = sectionProgress(sections.exts);
  res = drawAnimatedStacked(canvases.exts, DATA, EXTS, EXT_COLORS.slice(0, EXTS.length), p);
  if (res) {
    const d = DATA[res.edgeIdx];
    if (d) {
      readouts.exts.date.textContent = d.date;
      readouts.exts.val.textContent  = Math.round(res.edgeTotal).toLocaleString() + ' lines';
    }
    renderLegend(res.edgeExt);
  }

  // Overall page progress (rail on the right)
  const docH = document.documentElement.scrollHeight - window.innerHeight;
  const pct = docH > 0 ? Math.max(0, Math.min(1, window.scrollY / docH)) : 0;
  document.getElementById('progressFill').style.height = (pct * 100) + '%';
}

let queued = false;
function onScroll() {
  if (queued) return;
  queued = true;
  requestAnimationFrame(() => {
    redraw();
    queued = false;
  });
}

window.addEventListener('scroll', onScroll, { passive: true });
window.addEventListener('resize', onScroll);

/* ---------------- Outro stats ---------------- */
(function renderOutro() {
  const net = STATS.net_change;
  const netStr = (net >= 0 ? '+' : '') + net.toLocaleString();
  const netClass = net >= 0 ? '' : 'neg';
  const rows = [
    [STATS.lines_now.toLocaleString(), 'Lines now'],
    [STATS.files_now.toLocaleString(), 'Files now'],
    [`<span class="${netClass}">${netStr}</span>`, 'Net line change'],
    [STATS.total_commits.toLocaleString(), 'Total commits'],
    [STATS.active_weeks + ' weeks', 'Active weeks'],
    ['+' + STATS.biggest_jump.delta.toLocaleString(), 'Biggest jump'],
  ];
  const el = document.getElementById('outroStats');
  rows.forEach(([v, l]) => {
    el.innerHTML += `<div class="outro-stat"><div class="v">${v}</div><div class="l">${l}</div></div>`;
  });
})();

/* Render once on load so charts are visible before the first scroll. */
redraw();
</script>
</body>
</html>
